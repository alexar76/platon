server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Standalone / direct port with VITE_BASE_PATH=/platon/
    location ^~ /platon/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /platon/ws {
        proxy_pass http://platon-backend:9200/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location ^~ /platon/api/ {
        proxy_pass http://platon-backend:9200/api/;
        proxy_set_header Host $host;
    }

    location ^~ /platon/.well-known/ {
        proxy_pass http://platon-backend:9200/.well-known/;
    }

    location ^~ /platon/ai-market/ {
        proxy_pass http://platon-backend:9200/ai-market/;
    }

    location ^~ /platon/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
    }

    # Root paths (oracle edge nginx strips /platon/ → container /)
    location /api/ {
        proxy_pass http://platon-backend:9200;
    }

    location /ws {
        proxy_pass http://platon-backend:9200;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /.well-known/ {
        proxy_pass http://platon-backend:9200;
    }

    location /ai-market/ {
        proxy_pass http://platon-backend:9200;
    }
}
